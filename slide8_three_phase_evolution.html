<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://unpkg.com/@fontsource/permanent-marker/index.css" rel="stylesheet">
<link href="https://unpkg.com/@fontsource/caveat/400.css" rel="stylesheet">
<style>body { margin: 0; background: #FDF8F0; }</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 420" style="background:#FDF8F0;display:block">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Timeline baseline -->
  <line x1="40" y1="310" x2="640" y2="310" stroke="#999" stroke-width="2" marker-end="url(#arr-dark)"/>
  <text x="650" y="315" font-family="'Caveat',sans-serif" font-size="13" fill="#888">time</text>

  <!-- PHASE 1 -->
  <rect x="40" y="36" width="178" height="256" rx="10" fill="#F1F8E9" stroke="#AED581" stroke-width="1.5"/>
  <text x="129" y="60" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="15" fill="#558B2F">Phase 1</text>
  <text x="129" y="78" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="12" fill="#7CB342">2022 — early 2023</text>

  <!-- Atomic usage: isolated boxes -->
  <rect x="68" y="96" width="60" height="32" rx="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="98" y="116" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#1B5E20">HUMAN</text>

  <rect x="140" y="96" width="52" height="32" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="166" y="116" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#0D47A1">AI</text>

  <rect x="68" y="144" width="52" height="32" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="94" y="164" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#0D47A1">AI</text>

  <rect x="140" y="144" width="52" height="32" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="166" y="164" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#0D47A1">AI</text>

  <text x="129" y="210" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="13" fill="#558B2F">Atomic</text>
  <text x="129" y="228" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="12" fill="#689F38">100% isolated tasks</text>
  <text x="129" y="244" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="12" fill="#689F38">LLMs as curiosities</text>
  <text x="129" y="278" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="11" fill="#999">Phase 1 marker</text>
  <line x1="129" y1="284" x2="129" y2="310" stroke="#AED581" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- PHASE 2 — danger zone -->
  <rect x="234" y="36" width="178" height="256" rx="10" fill="#FFF8E1" stroke="#FFB300" stroke-width="2.5"/>
  <!-- danger zone shading -->
  <rect x="234" y="36" width="178" height="256" rx="10" fill="#FF6F00" fill-opacity="0.06"/>

  <text x="323" y="60" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="15" fill="#E65100">Phase 2</text>
  <text x="323" y="78" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="12" fill="#FB8C00">mid 2023 — early 2024</text>

  <!-- Degraded centaur: faded human, rubber stamp -->
  <rect x="258" y="96" width="60" height="32" rx="5" fill="#F5F5F5" stroke="#BBBBBB" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="288" y="116" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#AAAAAA">HUMAN</text>

  <line x1="318" y1="112" x2="336" y2="112" stroke="#BBBBBB" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <polygon points="358,96 374,112 358,128 342,112" fill="#F5F5F5" stroke="#BBBBBB" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="358" y="116" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="9" fill="#AAAAAA">gate</text>

  <rect x="270" y="152" width="52" height="32" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="296" y="172" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#0D47A1">AI</text>

  <!-- Approved stamp -->
  <rect x="326" y="148" width="58" height="20" rx="3" fill="none" stroke="#C62828" stroke-width="1.5" transform="rotate(-10,355,158)"/>
  <text x="355" y="162" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="9" fill="#C62828" transform="rotate(-10,355,162)">APPROVED</text>

  <text x="323" y="210" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="13" fill="#E65100">Delegation</text>
  <text x="323" y="228" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="12" fill="#FB8C00">~70% Degraded Centaur</text>

  <!-- Danger zone label -->
  <rect x="254" y="242" width="138" height="24" rx="5" fill="#FF6F00" fill-opacity="0.12" stroke="#E65100" stroke-width="1.5"/>
  <text x="323" y="258" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="12" fill="#C62828">⚠ danger zone</text>

  <line x1="323" y1="284" x2="323" y2="310" stroke="#FFB300" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="323" y="278" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="11" fill="#999">Phase 2 marker</text>

  <!-- PHASE 3 -->
  <rect x="428" y="36" width="210" height="256" rx="10" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1.5"/>
  <text x="533" y="60" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="15" fill="#1565C0">Phase 3</text>
  <text x="533" y="78" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="12" fill="#42A5F5">mid 2024 — present</text>

  <!-- Distribution bars -->
  <text x="450" y="104" font-family="'Caveat',sans-serif" font-size="12" fill="#555">Atomic</text>
  <rect x="510" y="92" width="100" height="14" rx="3" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
  <text x="614" y="104" font-family="'Caveat',sans-serif" font-size="11" fill="#388E3C">50%</text>

  <text x="450" y="126" font-family="'Caveat',sans-serif" font-size="12" fill="#555">Active</text>
  <rect x="510" y="114" width="50" height="14" rx="3" fill="#A5D6A7" stroke="#388E3C" stroke-width="1"/>
  <text x="564" y="126" font-family="'Caveat',sans-serif" font-size="11" fill="#388E3C">25%</text>

  <text x="450" y="148" font-family="'Caveat',sans-serif" font-size="12" fill="#555">Degraded</text>
  <rect x="510" y="136" width="40" height="14" rx="3" fill="#FFCCBC" stroke="#E64A19" stroke-width="1"/>
  <text x="554" y="148" font-family="'Caveat',sans-serif" font-size="11" fill="#E64A19">20%</text>

  <text x="450" y="170" font-family="'Caveat',sans-serif" font-size="12" fill="#555">Cyborg</text>
  <rect x="510" y="158" width="10" height="14" rx="3" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
  <text x="524" y="170" font-family="'Caveat',sans-serif" font-size="11" fill="#1565C0">5%</text>

  <text x="533" y="210" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="13" fill="#1565C0">Differentiation</text>
  <text x="533" y="228" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="12" fill="#42A5F5">Patterns diverge</text>
  <text x="533" y="244" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="12" fill="#42A5F5">Cyborg remains minority</text>

  <line x1="533" y1="284" x2="533" y2="310" stroke="#64B5F6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="533" y="278" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="11" fill="#999">Phase 3 marker</text>

  <!-- Bottom note -->
  <text x="340" y="346" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="13" fill="#555">Both contexts. Opposing governance. Identical trajectory.</text>

</svg>
</body>
</html>
