<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://unpkg.com/@fontsource/permanent-marker/index.css" rel="stylesheet">
<link href="https://unpkg.com/@fontsource/caveat/400.css" rel="stylesheet">
<style>body { margin: 0; background: #FDF8F0; }</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 400" style="background:#FDF8F0;display:block">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-white" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#FDF8F0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Risk axis label -->
  <text x="28" y="220" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="13" fill="#888" transform="rotate(-90,28,220)">cost of failure</text>
  <line x1="40" y1="340" x2="40" y2="40" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TIER 3 — Low impact (bottom) -->
  <rect x="56" y="290" width="590" height="72" rx="10" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1.5"/>
  <text x="116" y="316" font-family="'Permanent Marker',cursive" font-size="13" fill="#1565C0">Tier 3 — Low impact</text>

  <!-- Atomic box -->
  <rect x="116" y="326" width="80" height="28" rx="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="156" y="344" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#1B5E20">ATOMIC</text>

  <!-- Cyborg box -->
  <rect x="210" y="326" width="80" height="28" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="344" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#0D47A1">CYBORG</text>

  <text x="460" y="322" font-family="'Caveat',sans-serif" font-size="13" fill="#1565C0">Reversible tasks</text>
  <text x="460" y="340" font-family="'Caveat',sans-serif" font-size="13" fill="#1565C0">Spot-checking only</text>
  <text x="460" y="356" font-family="'Caveat',sans-serif" font-size="12" fill="#90CAF9">Cyborg requires mature observability</text>

  <!-- TIER 2 — Moderate (middle) -->
  <rect x="56" y="194" width="590" height="84" rx="10" fill="#FFF8E1" stroke="#FFB300" stroke-width="1.5"/>
  <text x="116" y="218" font-family="'Permanent Marker',cursive" font-size="13" fill="#E65100">Tier 2 — Moderate</text>

  <!-- Structured centaur flow -->
  <rect x="116" y="228" width="80" height="28" rx="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="156" y="246" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#1B5E20">HUMAN</text>

  <line x1="196" y1="242" x2="212" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="214" y="228" width="60" height="28" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="244" y="246" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#0D47A1">AI</text>

  <line x1="274" y1="242" x2="290" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <polygon points="308,228 324,242 308,256 292,242" fill="#FFF9C4" stroke="#F57F17" stroke-width="1.5"/>
  <text x="308" y="246" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="10" fill="#E65100">gate</text>

  <text x="460" y="228" font-family="'Caveat',sans-serif" font-size="13" fill="#E65100">Enforce validation gates</text>
  <text x="460" y="246" font-family="'Caveat',sans-serif" font-size="13" fill="#E65100">Not just suggest them</text>
  <text x="460" y="264" font-family="'Caveat',sans-serif" font-size="12" fill="#FFB300">Bounded consequences</text>

  <!-- TIER 1 — High impact (top) -->
  <rect x="56" y="56" width="590" height="124" rx="10" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
  <!-- Mandatory badge -->
  <rect x="430" y="66" width="100" height="26" rx="5" fill="#C62828"/>
  <text x="480" y="83" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="12" fill="#FDF8F0">MANDATORY</text>

  <text x="116" y="84" font-family="'Permanent Marker',cursive" font-size="13" fill="#B71C1C">Tier 1 — High impact</text>

  <!-- Active centaur flow -->
  <rect x="116" y="96" width="80" height="28" rx="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="2"/>
  <text x="156" y="114" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#1B5E20">HUMAN</text>

  <line x1="196" y1="110" x2="212" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="214" y="96" width="60" height="28" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="2"/>
  <text x="244" y="114" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#0D47A1">AI</text>

  <line x1="274" y1="110" x2="290" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <polygon points="308,96 324,110 308,124 292,110" fill="#FFF9C4" stroke="#F57F17" stroke-width="2"/>
  <text x="308" y="114" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="10" fill="#E65100">gate</text>

  <line x1="324" y1="110" x2="340" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="342" y="96" width="80" height="28" rx="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="2"/>
  <text x="382" y="114" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="10" fill="#1B5E20">HUMAN</text>

  <text x="116" y="154" font-family="'Caveat',sans-serif" font-size="13" fill="#C62828">Safety, compliance, financial exposure</text>
  <text x="116" y="170" font-family="'Caveat',sans-serif" font-size="13" fill="#C62828">Irreversible decisions</text>

  <!-- Bottom note -->
  <text x="340" y="378" text-anchor="middle" font-family="'Caveat',sans-serif" font-size="13" fill="#555">Align to risk tier, not model capability. You don't skip stages.</text>

</svg>
</body>
</html>
